services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./saas.db
      - JWT_SECRET=change-this-in-production
    volumes:
      - ./backend:/app
      - ./src:/app/src
      - saas_data:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  saas_data:
